# nixpacks.toml — Konfigurasi build untuk Railway
#
# KUNCI UTAMA: baris "providers" di bawah ini memaksa Nixpacks
# HANYA menggunakan Node.js dan MELEWATI deteksi otomatis Gradle/Android.
# Tanpa baris ini, Nixpacks tetap mendeteksi build.gradle.kts dan
# mencoba menjalankan ./gradlew clean build → deployment gagal.

providers = ["node"]   # ← INI yang mencegah deteksi Gradle

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install"]

[start]
cmd = "node server.js"

